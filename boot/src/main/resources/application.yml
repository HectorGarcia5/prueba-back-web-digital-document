spring:
  application:
    name: prueba-back-web-digital-document

# Actuator endpoints configuration
management:
  endpoint:
    metrics:
      enabled: true
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: [ info, health, metrics, prometheus ]

fwkcna:
  buckets:
    - id: digital-documents
      bucket-name: ${BUCKET_NAME}
      enabled: true
      url: ${BUCKET_ENDPOINT}
      signed-operation-token-expiration: 120
      provider: ${BUCKET_PROVIDER:netapp}
      credentials:
        access-key: ${BUCKET_ACCESS_KEY}
        secret-key: ${BUCKET_SECRET_KEY}
  outbox:
    enabled: true
    table-name: ${TABLE_NAME:o_outbox}
    schema-registries:
      sr-basic:
        url: ${SCHEMA_REGISTRY_URL}
        authentication:
          basic:
            user: ${KAFKA_USER}
            password: ${KAFKA_PASSWORD}
  security:
    enabled: ${SECURITY_ENABLED:true}
    jwt:
      issuer-uri: ${SECURITY_ISSUER_URI}

outbox:
  topic:
    employee-digital-document: ${KAFKA_TOPIC_OUTPUT:thirdparty.employee.employeedigitaldocument.event.restrictedout.v0.table.cpd}

server:
  port: 8080
